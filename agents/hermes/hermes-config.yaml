provider: eastrouter
base_url: https://api.eastrouter.com/v1
api_key: ${EASTROUTER_API_KEY}
model: deepseek/deepseek-v4-pro

memory:
  enabled: true
  persistence: local

skills:
  autoLearn: true
  directory: ./agents/skills

slack:
  enabled: true
  bot_token: ${SLACK_BOT_TOKEN}
  app_token: ${SLACK_APP_TOKEN}
  channels:
    - sprint-main
    - agent-coder
    - human-review